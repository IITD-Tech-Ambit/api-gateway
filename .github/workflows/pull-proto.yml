name: Pull proto update from registry

# Reverse side of proto-registry's owner sync workflows: an owning service
# (e.g. research-ambit-main for directory.v1) pushes to proto-registry, then
# dispatches this event to every consumer listed for that package in
# proto-registry/consumers.yml. We fetch the current file for that package
# and open a PR against our own main if it actually differs — same
# low-ceremony philosophy as the owner-side sync (no linting, no manual
# versioning), just automated instead of relying on someone noticing drift.
on:
  repository_dispatch:
    types: [proto-updated]

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: consumer

      - name: Checkout proto-registry
        uses: actions/checkout@v4
        with:
          repository: IITD-Tech-Ambit/proto-registry
          path: proto-registry

      - name: Copy updated proto file if we depend on it
        id: copy
        working-directory: consumer
        env:
          PACKAGE: ${{ github.event.client_payload.package }}
        run: |
          LOCAL_PATH=$(python3 -c "import json,os; print(json.load(open('.proto-deps.json')).get(os.environ['PACKAGE'], ''))")
          if [ -z "$LOCAL_PATH" ]; then
            echo "This repo doesn't depend on $PACKAGE — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PKG_NAME=$(echo "$PACKAGE" | cut -d. -f1)
          PKG_VER=$(echo "$PACKAGE" | cut -d. -f2)
          REGISTRY_PATH="../proto-registry/proto/${PKG_NAME}/${PKG_VER}/${PKG_NAME}.proto"

          if diff -q "$REGISTRY_PATH" "$LOCAL_PATH" > /dev/null 2>&1; then
            echo "$PACKAGE is already in sync — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p "$(dirname "$LOCAL_PATH")"
          cp "$REGISTRY_PATH" "$LOCAL_PATH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Open PR with the update
        if: steps.copy.outputs.changed == 'true'
        working-directory: consumer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ steps.copy.outputs.package }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sync-proto/${PACKAGE}-$(date +%Y%m%d%H%M%S)"
          git switch -c "$BRANCH"
          git add .proto-deps.json
          git add "$(python3 -c "import json,os; print(json.load(open('.proto-deps.json')).get(os.environ['PACKAGE'], ''))")"
          git commit -m "chore(proto): sync ${PACKAGE} from proto-registry"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(proto): sync ${PACKAGE} from proto-registry" \
            --body "Automated pull of ${PACKAGE} following an update in proto-registry. Auto-merges once required checks pass." \
          && gh pr merge "$BRANCH" --merge --auto --delete-branch
